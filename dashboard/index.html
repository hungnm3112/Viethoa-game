<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Việt hóa Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">

    <!-- Zone 1: Tiến độ tổng thể -->
    <header class="zone zone-header">
      <div class="big-pct" id="big-pct">…%</div>
      <div class="header-right">
        <div class="strings-count" id="strings-count">Đang tải...</div>
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="status-line" id="status-line">Đang kết nối...</div>
      </div>
    </header>

    <!-- Zone 2: Điều khiển và log -->
    <div class="zone zone-action">

      <!-- Hàng trên: tên task + nút điều khiển -->
      <div class="action-top">
        <div class="run-name-row">
          <span class="run-name" id="run-name"></span>
          <span class="run-since" id="run-since"></span>
        </div>
        <div class="control-btns">
          <button id="btn-start" class="btn-start" disabled title="Dùng khi muốn chạy lại từ đầu">▶ Bắt đầu Việt hóa</button>
          <button id="btn-resume" class="btn-resume hidden" title="Chạy các job đang có trong queue hiện tại">▶ Chạy queue hiện tại</button>
          <button id="btn-stop" class="btn-stop" disabled>■ Stop</button>
        </div>
      </div>

      <!-- Thông báo phụ: retry job lỗi / queue trống -->
      <div id="action-msg" class="action-msg hidden"></div>

      <!-- Log output: luôn hiển thị -->
      <pre id="log-box" class="log-box">Đang chờ dữ liệu...</pre>

      <!-- Danh sách script khác (ẩn khi đang chạy) -->
      <div id="scripts-panel" class="scripts-panel"></div>

    </div>

    <!-- Zone 3: Bảng độ phủ theo file -->
    <div class="zone zone-table">
      <div class="zone-title">Độ phủ theo file</div>
      <table>
        <thead>
          <tr>
            <th>File</th>
            <th class="num">Đã dịch</th>
            <th class="num">Tổng</th>
            <th class="num">%</th>
          </tr>
        </thead>
        <tbody id="files-body">
          <tr><td colspan="4" class="empty-row">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
